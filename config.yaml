server:
  host: "127.0.0.1"
  port: 5000
  workers: 4

cors:
  allowed_origins: [
    "http://localhost:3000",
    "http://localhost:3001",
    "http://127.0.0.1:3000",
    "https://solanize.ai",
    "https://www.solanize.ai"
  ]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  # allowed_headers: ["Content-Type", "Authorization", "Accept", "Origin", "X-Requested-With"]
  allowed_headers: ["*"]
  allow_credentials: true

database:
  url: "sqlite://gateway.db"
  max_connections: 10

auth:
  jwt_secret: "your-super-secret-jwt-key-change-in-production"
  jwt_expires_hours: 24
  challenge_expires_minutes: 5

chat:
  max_sessions_per_user: 100
  max_messages_per_session: 1000
  # Must be "claude" — MCP tool calling requires the Anthropic Messages API
  ai_provider: "claude"
  # solanize-mcp public URL — Anthropic's cloud connects here to call tools,
  # so this MUST be a public HTTPS URL, not 127.0.0.1.
  # deploy-vps.sh replaces this with https://mcp.solanize.ai/mcp/<MCP_SECRET>
  solanize_mcp_url: "http://127.0.0.1:4010/mcp/change-me-in-production"

  ollama:
    url: "http://localhost:11434"
    model: "deepseek-r1:8b"
    timeout_seconds: 30
    
  api_providers:
    claude:
      api_key: "${CLAUDE_API_KEY}"
      base_url: "https://api.anthropic.com"
      endpoint: "/v1/messages"
      model: "claude-sonnet-4-20250514"
      timeout_seconds: 30
      response_path: "content.0.text"
      
    openai:
      api_key: "your-openai-api-key"
      base_url: "https://api.openai.com"
      endpoint: "/v1/chat/completions"
      model: "gpt-4"
      timeout_seconds: 30
      response_path: "choices.0.message.content"
      
    cohere:
      api_key: "${COHERE_API_KEY}"
      base_url: "https://api.cohere.ai"
      endpoint: "/v1/chat"
      model: "command-r7b-12-2024"  # or "command-r-08-2024"
      timeout_seconds: 30
      response_path: "text"

payment:
  solana_service_url: "http://127.0.0.1:9876" # cli-solanize (localhost only)
  cli_internal_secret: "change-me-in-production" # must match CLI_INTERNAL_SECRET on cli-solanize
  solana_rpc_url: "https://api.devnet.solana.com"
  premium_price_sol: 0.1
  timeout_seconds: 30

logging:
  level: "info"
  format: "json"
